# AI SERVO PLATFORM — local/dev compose.
#
# Batch 1 scope: the `api` service (skeleton) plus postgres/redis so the stack is
# forward-compatible with later batches (audit tables, engine cache, worker).
# The app does NOT use postgres/redis yet — they are declared here so `docker
# compose up` matches the target topology in PROMPT §6.
#
# Per PROMPT §6: only the reverse proxy is meant to publish ports in prod.
# For local dev we bind api to 127.0.0.1 only; postgres/redis stay internal.
services:
  api:
    build: .
    env_file:
      - .env
    environment:
      APP_ENV: dev
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - engine_data:/srv/data/engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    build: .
    command: ["arq", "worker.main.WorkerSettings"]
    env_file:
      - .env
    volumes:
      - engine_data:/srv/data/engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiservo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-aiservo}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiservo}"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  engine_data:
