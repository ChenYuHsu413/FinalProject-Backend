name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aiservo
          POSTGRES_PASSWORD: aiservo
          POSTGRES_DB: aiservo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aiservo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SERVICE_TOKEN: ci-test-token
      DATABASE_URL: postgresql+asyncpg://aiservo:aiservo@localhost:5432/aiservo_test
      TEST_DATABASE_URL: postgresql+asyncpg://aiservo:aiservo@localhost:5432/aiservo_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Alembic migrate
        run: alembic upgrade head
      - name: Pytest
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ai-servo-backend:ci .
